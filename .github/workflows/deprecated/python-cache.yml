name: Python cache

on: 
  push: 
    branches: [ "main" ]
  workflow_dispatch:
  
jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
      
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'
      
      - name: Display cache info
        run: |
          if [ -d ~/.cache ]; then 
            ls -lah ~/.cache/pip 2>/dev/null || echo "Pip cache is empty";
          else 
            echo "Cache dir does not exist"; 
          fi
      
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"
